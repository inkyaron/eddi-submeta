<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>エッヂ・サブメタ保管庫</title>
    <link rel="stylesheet" href="./styles.css?v=20260428a" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <p class="eyebrow">Eddibb Subject-Metadent Archive</p>
        <h1>エッヂ・サブメタ保管庫</h1>
        <p class="lead">
          エッヂ掲示板のsubject-metadent(通称<b>スレ立てID</b>,<b>記者ID</b>)の保管庫。<br>
          巡回頻度5分の間に立って落ちたスレは取り逃し。
        </p>
        <div class="meta">
          <a href="https://raw.githubusercontent.com/inkyaron/eddi-submeta/refs/heads/main/data/records.json">JSON</a>
          2026/4/26から記録。
          <span id="updated-at">最終更新 読み込み中</span>
        </div>
      </header>

      <section class="panel stats">
        <div class="stat">
          <strong id="total-count">0</strong>
          <span>記録件数</span>
        </div>
        <div class="stat">
          <strong id="result-count">0</strong>
          <span>検索結果</span>
        </div>
      </section>

      <section class="panel controls">
        <p class="search-note">
          複数の検索条件を入力した場合は AND 検索。部分一致。
        </p>

        <form id="search-form">
          <div class="filters">
            <label>
              <span>スレ番号</span>
              <input id="thread-filter" type="text" inputmode="numeric" placeholder="例: 1777138729" />
            </label>
            <label>
              <span class="label-with-help">
                meta-upper
                <span class="help-tip" tabindex="0" aria-label="meta-upperの説明">
                  ?
                    <span class="tooltip-text">ASN・UA・認証レベルから計算</span>
                </span>
              </span>
              <input id="upper-filter" type="text" maxlength="4" placeholder="例: pMFf" />
            </label>
            <label>
              <span class="label-with-help">
                meta-lower
                <span class="help-tip" tabindex="0" aria-label="meta-lowerの説明">
                  ?
                  <span class="tooltip-text">IPアドレスから計算</span>
                </span>
              </span>
              <input id="lower-filter" type="text" maxlength="4" placeholder="例: bRCn" />
            </label>
            <label>
              <span>レスID</span>
              <input id="id-filter" type="text" placeholder="例: bRCqwQRln" />
            </label>
          </div>

          <div class="filters filters-title">
            <label class="filter-title">
              <span>スレタイ</span>
              <input id="title-filter" type="text" placeholder="例: エッヂ死んだ飼い犬が夢に出る部" />
            </label>
          </div>

          <div class="actions">
            <button id="search-button" type="submit">検索</button>
            <button id="clear-button" type="button" class="secondary">クリア</button>
          </div>
        </form>
      </section>

      <section class="panel table-panel">
        <table>
          <thead>
            <tr>
              <th>スレ番号</th>
              <th>meta-upper</th>
              <th>meta-lower</th>
              <th>レスID</th>
              <th>スレ立て日時</th>
              <th>スレタイ</th>
            </tr>
          </thead>
          <tbody id="results"></tbody>
        </table>
        <p id="empty-state" class="empty" hidden>検索条件を入力してください。</p>
      </section>
    </div>

    <template id="row-template">
      <tr>
        <td class="mono thread"></td>
        <td class="mono upper"></td>
        <td class="mono lower"></td>
        <td class="mono first-post-id"></td>
        <td class="first-post-datetime"></td>
        <td class="thread-title"></td>
      </tr>
    </template>

    <script src="./main.js?v=20260428a" type="module"></script>
  </body>
</html>
